<!DOCTYPE html>
<html lang="en">
<head>

<title>Sprinter – Play Now</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #222;
        color: #fff;
        text-align: center;
    }

    header {
        background: #1a1a1a;
        padding: 20px;
        font-size: 32px;
        font-weight: bold;
        color: #ffea00;
    }

    .container {
        margin-top: 60px;

        padding: 40px;

        color: #000;
        background: #ffea00;
        border-radius: 10px;
        text-decoration: none;
        transition: 0.2s;

    .play-btn:hover {
        background: #ffee55;
    }
</style>

<div class="container">
    <div class="game-box">
        <h1>Sprinter</h1>
